name: Website Automated Tests

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  test-website:
    name: Run website tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Google Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-html requests beautifulsoup4 selenium webdriver-manager

      - name: Run automated tests and generate HTML report
        run: |
          pytest -v test_bn_consulting.py --html=raport_testare.html --self-contained-html

      - name: Upload HTML test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: raport-testare-site
          path: raport_testare.html

      - name: Upload pytest cache and screenshots if available
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-debug-files
          path: |
            .pytest_cache
            screenshots
          if-no-files-found: ignore
